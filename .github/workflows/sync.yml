
name: Sync to repo-syn-b

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout REPO-SYNC
        uses: actions/checkout@v3

      - name: Push to REPO-SYNC-MAIN
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git remote add -b repo-sync-main https://x-access-token:${{ secrets.POWER_SYNC_MAIN }}@github.com/aungkaungmyathtun-kbz/repo-sync-b.git
          git push repo-sync-main main
